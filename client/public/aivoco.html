<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenVoice - AI Voice Assistant</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #ffffff 0%, #ffffff 100%);
            color: #333;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .main-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px     rgba(0, 0, 0, 0.219);
            text-align: center;
            min-width: 350px;
            max-width: 500px;
            width: 100%;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: white;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .app-title {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .app-subtitle {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 40px;
            font-weight: 500;
        }

        .call-section {
            margin-bottom: 30px;
        }

        .status-display {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            border: 2px solid #e9ecef;
            transition: all 0.3s ease;
        }

        .status-display.connected {
            background: linear-gradient(135deg, #d4edda, #c3e6cb);
            border-color: #28a745;
        }

        .status-display.disconnected {
            background: linear-gradient(135deg, #f8d7da, #f1b0b7);
            border-color: #dc3545;
        }

        .status-text {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .status-subtext {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .call-controls {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 16px 32px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            min-width: 140px;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-start {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            box-shadow: 0 8px 20px rgba(40, 167, 69, 0.3);
        }

        .btn-start:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(40, 167, 69, 0.4);
        }

        .btn-stop {
            background: linear-gradient(135deg, #dc3545, #c82333);
            color: white;
            box-shadow: 0 8px 20px rgba(220, 53, 69, 0.3);
        }

        .btn-stop:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(220, 53, 69, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn:disabled::before {
            display: none;
        }

        .audio-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #dc3545;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .audio-indicator.active {
            background: #28a745;
            animation: pulse 1.5s infinite;
            box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.7);
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.7);
            }
            70% {
                box-shadow: 0 0 0 10px rgba(40, 167, 69, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(40, 167, 69, 0);
            }
        }

        .greeting-message {
            background: linear-gradient(135deg, #e3f2fd, #bbdefb);
            border-radius: 16px;
            padding: 20px;
            margin: 20px 0;
            border-left: 4px solid #2196f3;
            font-size: 1rem;
            color: #1976d2;
            display: none;
        }

        .greeting-message.show {
            display: block;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .call-logs {
            /* background: #1a1a1a;
            border-radius: 16px;
            padding: 20px;
            margin-top: 30px;
            max-height: 200px;
            overflow-y: auto;
            text-align: left; */
            display: none !important;
        }

        .logs-title {
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 12px;
            text-align: center;
        }

        .log-entry {
            font-size: 0.85rem;
            margin-bottom: 6px;
            font-family: 'Consolas', 'Monaco', monospace;
            color: #e0e0e0;
            opacity: 0.9;
        }

        .log-timestamp {
            color: #888;
        }

        .log-success {
            color: #4caf50;
        }

        .log-error {
            color: #f44336;
        }

        .log-info {
            color: #2196f3;
        }

        .log-ai {
            color: #ff9800;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .main-container {
                padding: 30px 20px;
                margin: 10px;
                min-width: unset;
            }

            .app-title {
                font-size: 2rem;
            }

            .call-controls {
                flex-direction: column;
                align-items: center;
            }

            .btn {
                width: 100%;
                max-width: 250px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .main-container {
                padding: 25px 15px;
            }

            .app-title {
                font-size: 1.8rem;
            }

            .logo {
                width: 60px;
                height: 60px;
                font-size: 28px;
            }
        }

        /* Loading Animation */
        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top: 2px solid currentColor;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- Logo and Title -->
        <div class="logo">Z</div>
        <h1 class="app-title">ZenVoice</h1>
        <p class="app-subtitle">AI Voice Assistant</p>

        <!-- Status Display -->
        <div class="status-display" id="statusDisplay">
            <div class="status-text" id="statusText">Ready to Connect</div>
            <div class="status-subtext" id="statusSubtext">Click "Start Call" to begin your conversation</div>
        </div>

        <!-- Greeting Message -->
        <div class="greeting-message" id="greetingMessage">
            Call connected successfully. You can start talking to your AI assistant.
        </div>

        <!-- Call Controls -->
        <div class="call-section">
            <div class="call-controls">
                <button id="startCall" class="btn btn-start" onclick="startCall()">
                    <span class="loading-spinner" id="startSpinner" style="display: none;"></span>
                    <span id="startText">Start Call</span>
                    <span class="audio-indicator" id="audioIndicator"></span>
                </button>
                <button id="stopCall" class="btn btn-stop" onclick="stopCall()" disabled>
                    Stop Call
                </button>
            </div>
        </div>

        <!-- Call Logs -->
        <div class="call-logs">
            <div class="logs-title">Call Logs</div>
            <div id="callLogs">
                <div class="log-entry">
                    <span class="log-timestamp">[Ready]</span> 
                    <span class="log-info">ZenVoice is ready to assist you</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // WebSocket connection
        const socket = io('https://sts.aivoco.on.cloud.vispark.in');
        
        // State variables
        let isCallActive = false;
        let callStartTime = null;
        let audioContext = null;
        let mediaStream = null;
        let processor = null;
        let authKey = '';
        let systemMessage = '';
        let firstMessage = '';

        // Elements
        const statusDisplay = document.getElementById('statusDisplay');
        const statusText = document.getElementById('statusText');
        const statusSubtext = document.getElementById('statusSubtext');
        const greetingMessage = document.getElementById('greetingMessage');
        const startCallBtn = document.getElementById('startCall');
        const stopCallBtn = document.getElementById('stopCall');
        const audioIndicator = document.getElementById('audioIndicator');
        const startSpinner = document.getElementById('startSpinner');
        const startText = document.getElementById('startText');
        const callLogs = document.getElementById('callLogs');

        // Listen for parameters from parent window
        window.addEventListener("message", (event) => {
            console.log("Received params:", event.data);
            const { systemPrompt, firstMessage: message, apiKey } = event.data;
            authKey = apiKey;
            systemMessage = systemPrompt;
            firstMessage = message;
            
            if (authKey) {
                updateStatus('Ready to Start Call', 'Your AI assistant is configured and ready', 'ready');
            }
        });

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            addLog('ZenVoice initialized', 'info');
        });

        // Utility Functions
        function updateStatus(text, subtext, type = 'default') {
            statusText.textContent = text;
            statusSubtext.textContent = subtext;
            
            statusDisplay.className = 'status-display';
            if (type === 'connected') {
                statusDisplay.classList.add('connected');
            } else if (type === 'error') {
                statusDisplay.classList.add('disconnected');
            }
        }

        function addLog(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const logClass = `log-${type}`;
            
            const logEntry = document.createElement('div');
            logEntry.className = 'log-entry';
            logEntry.innerHTML = `<span class="log-timestamp">[${timestamp}]</span> <span class="${logClass}">${message}</span>`;
            
            callLogs.appendChild(logEntry);
            
            // Keep only last 20 logs
            const logs = callLogs.children;
            if (logs.length > 20) {
                callLogs.removeChild(logs[0]);
            }
            
            // Auto scroll to bottom
            callLogs.scrollTop = callLogs.scrollHeight;
        }

        function showSpinner(show) {
            if (show) {
                startSpinner.style.display = 'inline-block';
                startText.textContent = 'Connecting...';
            } else {
                startSpinner.style.display = 'none';
                startText.textContent = 'Start Call';
            }
        }

        // Audio handling
        async function initializeAudio() {
            try {
                addLog('Requesting microphone access...', 'info');
                
                mediaStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        sampleRate: 16000,
                        channelCount: 1,
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    } 
                });
                
                audioContext = new (window.AudioContext || window.webkitAudioContext)({
                    sampleRate: 16000
                });
                
                if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                }
                
                const source = audioContext.createMediaStreamSource(mediaStream);
                processor = audioContext.createScriptProcessor(1024, 1, 1);
                
                processor.onaudioprocess = function(e) {
                    if (isCallActive) {
                        const inputBuffer = e.inputBuffer;
                        const inputData = inputBuffer.getChannelData(0);
                        
                        let hasSignificantAudio = false;
                        let maxAmplitude = 0;
                        for (let i = 0; i < inputData.length; i++) {
                            const amplitude = Math.abs(inputData[i]);
                            maxAmplitude = Math.max(maxAmplitude, amplitude);
                            if (amplitude > 0.001) {
                                hasSignificantAudio = true;
                            }
                        }
                        
                        const pcmData = new Int16Array(inputData.length);
                        for (let i = 0; i < inputData.length; i++) {
                            pcmData[i] = Math.max(-32768, Math.min(32767, inputData[i] * 32767));
                        }
                        
                        socket.emit('audio_data', {
                            audio_data: btoa(String.fromCharCode.apply(null, new Uint8Array(pcmData.buffer))),
                            has_audio: hasSignificantAudio,
                            max_amplitude: maxAmplitude
                        });
                    }
                };
                
                source.connect(processor);
                processor.connect(audioContext.destination);
                
                audioIndicator.classList.add('active');
                addLog('Microphone initialized successfully', 'success');
                
            } catch (error) {
                addLog(`Microphone access failed: ${error.message}`, 'error');
                updateStatus('Microphone Error', 'Please allow microphone access to use voice calls', 'error');
                throw error;
            }
        }

        // Audio streaming
        let audioQueue = [];
        let isPlayingStream = false;
        let nextScheduledTime = 0;
        let audioContextStartTime = 0;
        
        function playAudioResponse(audioData) {
            if (!audioContext) return;
            
            try {
                const binaryString = atob(audioData);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }
                
                const pcmData = new Int16Array(bytes.buffer);
                const floatData = new Float32Array(pcmData.length);
                for (let i = 0; i < pcmData.length; i++) {
                    floatData[i] = pcmData[i] / 32768.0;
                }
                
                audioQueue.push(floatData);
                
                if (!isPlayingStream) {
                    startAudioStream();
                }
                
            } catch (error) {
                addLog(`Audio playback error: ${error.message}`, 'error');
            }
        }
        
        function startAudioStream() {
            if (audioQueue.length === 0) {
                isPlayingStream = false;
                return;
            }
            
            isPlayingStream = true;
            
            if (audioContextStartTime === 0) {
                audioContextStartTime = audioContext.currentTime;
                nextScheduledTime = audioContextStartTime;
            }
            
            processAudioQueue();
        }
        
        function processAudioQueue() {
            while (audioQueue.length > 0 && isPlayingStream) {
                const floatData = audioQueue.shift();
                
                const audioBuffer = audioContext.createBuffer(1, floatData.length, 24000);
                audioBuffer.getChannelData(0).set(floatData);
                
                const source = audioContext.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(audioContext.destination);
                
                const bufferDuration = floatData.length / 24000;
                const scheduledTime = Math.max(nextScheduledTime, audioContext.currentTime);
                
                source.start(scheduledTime);
                nextScheduledTime = scheduledTime + bufferDuration;
                
                source.onended = () => {
                    if (audioQueue.length > 0 && isPlayingStream) {
                        setTimeout(() => processAudioQueue(), 1);
                    } else if (audioQueue.length === 0) {
                        isPlayingStream = false;
                    }
                };
                
                break;
            }
        }
        
        function stopAudioStream() {
            audioQueue = [];
            isPlayingStream = false;
            nextScheduledTime = 0;
            audioContextStartTime = 0;
        }

        function stopAudio() {
            stopAudioStream();
            
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }
            if (processor) {
                processor.disconnect();
                processor = null;
            }
            audioIndicator.classList.remove('active');
            addLog('Audio stopped', 'info');
        }

        // Call management
        async function startCall() {
            if (!authKey.trim()) {
                updateStatus('Configuration Error', 'API key is required to start the call', 'error');
                addLog('API key missing', 'error');
                return;
            }

            showSpinner(true);
            updateStatus('Connecting...', 'Initializing voice connection', 'connecting');
            addLog('Starting call with ZenVoco...', 'info');

            try {
                await initializeAudio();
                
                socket.emit('start_call', {
                    auth_key: authKey,
                    system_message: systemMessage,
                    voice_choice: 'Boy', // Default to male voice
                    custom_functions: [] // No custom functions needed
                });
                
                addLog('Call request sent to server', 'info');
            } catch (error) {
                showSpinner(false);
                updateStatus('Connection Failed', 'Unable to initialize audio', 'error');
                addLog('Call start failed due to audio initialization', 'error');
            }
        }

        function stopCall() {
            addLog('Stopping call...', 'info');
            updateStatus('Disconnecting...', 'Ending call with ZenVoco', 'disconnecting');
            
            socket.emit('stop_call');
            stopAudioStream();
            stopAudio();
        }

        // Socket event listeners
        socket.on('connect', function() {
            addLog('Connected to ZenVoice server', 'success');
            updateStatus('Server Connected', 'Ready to start your voice call', 'ready');
        });

        socket.on('disconnect', function() {
            addLog('Disconnected from server', 'error');
            updateStatus('Connection Lost', 'Please refresh to reconnect', 'error');
            isCallActive = false;
            showSpinner(false);
            startCallBtn.disabled = false;
            stopCallBtn.disabled = true;
            greetingMessage.classList.remove('show');
            stopAudioStream();
            stopAudio();
        });

        socket.on('auth_success', function(data) {
            addLog('Authentication successful', 'success');
            updateStatus('Authenticated', 'Ready to start voice call', 'ready');
        });

        socket.on('auth_failed', function(data) {
            addLog(`Authentication failed: ${data.message}`, 'error');
            updateStatus('Authentication Failed', data.message, 'error');
            showSpinner(false);
            startCallBtn.disabled = false;
        });

        socket.on('session_ready', function(data) {
            addLog('Voice session started successfully', 'success');
            updateStatus('Call Active', 'ZenVoco is listening and ready to respond', 'connected');
            
            greetingMessage.classList.add('show');
            
            isCallActive = true;
            callStartTime = Date.now();
            showSpinner(false);
            startCallBtn.disabled = true;
            stopCallBtn.disabled = false;
        });

        socket.on('session_ended', function(data) {
            let statusMessage = 'Call Ended';
            let logMessage = 'Voice session ended';
            
            if (data.reason === 'insufficient_user_credits') {
                statusMessage = 'Credits Exhausted';
                logMessage = 'Session ended - insufficient credits';
            } else if (data.reason === 'insufficient_admin_units') {
                statusMessage = 'Service Unavailable';
                logMessage = 'Session ended - service issue';
            } else if (data.message && data.message.includes('stopped by user')) {
                statusMessage = 'Call Stopped';
                logMessage = 'Call stopped by user';
            }
            
            addLog(logMessage, 'info');
            updateStatus(statusMessage, 'Ready to start a new call', 'default');
            
            if (data.total_credits_used !== undefined) {
                addLog(`Credits used: ${data.total_credits_used.toFixed(4)}`, 'info');
            }
            
            isCallActive = false;
            callStartTime = null;
            showSpinner(false);
            startCallBtn.disabled = false;
            stopCallBtn.disabled = true;
            greetingMessage.classList.remove('show');
            stopAudioStream();
            stopAudio();
        });

        socket.on('text_response', function(data) {
            addLog(`ZenVoco: ${data.text}`, 'ai');
        });

        socket.on('audio_response', function(data) {
            playAudioResponse(data.audio_data);
        });

        socket.on('error', function(data) {
            addLog(`Error: ${data.message}`, 'error');
            updateStatus('Error', data.message, 'error');
            
            isCallActive = false;
            showSpinner(false);
            startCallBtn.disabled = false;
            stopCallBtn.disabled = true;
            greetingMessage.classList.remove('show');
            stopAudioStream();
            stopAudio();
        });
    </script>
</body>
</html>
